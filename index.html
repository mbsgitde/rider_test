<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PyScript Test</title>

  <!-- ✅ DAS IST ENTSCHEIDEND -->
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
  <script src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>

<body>

  <h1>Test</h1>

  <button id="btn">Click Me</button>

  <div id="output">Noch nichts passiert</div>

  <script type="py">
import js

def test(event):
    js.document.getElementById("output").innerHTML = "✅ PyScript funktioniert!"

js.document.getElementById("btn").addEventListener("click", test)
  </script>

</body>
</html>
