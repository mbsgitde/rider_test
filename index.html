<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Bike Tour Planner</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    .stage { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>

<body>

<h1>🚴 Bike Tour Planner</h1>

<label>Route wählen:</label>
<select id="routeSelect">
  <option value="data/route-alps.gpx">Alpenroute</option>
  <option value="data/route-lake.gpx">Seenroute</option>
</select>

<button onclick="loadData()">Laden</button>

<div id="output"></div>

<script>
async function loadData() {
  const routeFile = document.getElementById("routeSelect").value;

  const gpxText = await fetch(routeFile).then(r => r.text());
  const stops = await fetch("data/stops.json").then(r => r.json());

  const points = parseGPX(gpxText);
  const stages = buildStages(points, stops);

  renderStages(stages);
}

function parseGPX(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, "text/xml");

  const trkpts = xml.getElementsByTagName("trkpt");
  const points = [];

  for (let pt of trkpts) {
    points.push({
      lat: parseFloat(pt.getAttribute("lat")),
      lon: parseFloat(pt.getAttribute("lon")),
      ele: parseFloat(pt.getElementsByTagName("ele")[0]?.textContent || 0)
    });
  }

  return points;
}

function haversine(p1, p2) {
  const R = 6371;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(p2.lat - p1.lat);
  const dLon = toRad(p2.lon - p1.lon);

  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(p1.lat)) *
            Math.cos(toRad(p2.lat)) *
            Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function buildStages(points, stops) {
  const stages = [];
  const chunk = Math.floor(points.length / (stops.length - 1));

  for (let i = 0; i < stops.length - 1; i++) {
    const segment = points.slice(i * chunk, (i + 1) * chunk);

    let dist = 0;
    for (let j = 0; j < segment.length - 1; j++) {
      dist += haversine(segment[j], segment[j+1]);
    }

    stages.push({
      name: `${stops[i].name} → ${stops[i+1].name}`,
      distance: dist
    });
  }

  return stages;
}

function renderStages(stages) {
  const output = document.getElementById("output");
  output.innerHTML = "";

  stages.forEach(s => {
    const div = document.createElement("div");
    div.className = "stage";
    div.innerHTML = `
      <b>${s.name}</b><br>
      Distanz: ${s.distance.toFixed(1)} km
    `;
    output.appendChild(div);
  });
}
</script>

</body>
</html>
