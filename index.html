<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bike Tour Planner V8</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;padding:20px}
#map{height:400px;margin-top:20px}
.stage{border:1px solid #ccc;margin:12px;padding:12px}
.hotel{margin-top:10px;padding:10px;background:#f7f7f7}
canvas{max-width:600px}
</style>
</head>
<body>
<h1>🚴 Bike Tour Planner V8</h1>
<select id="routeSelect">
<option value="alps">Alpenroute</option>
<option value="lake">Seenroute</option>
</select>
<button onclick="loadTour()">Tour laden</button>
<div id="map"></div>
<div id="output"></div>
<script>
let map=L.map('map').setView([47.5,11.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let group=L.layerGroup().addTo(map);

async function loadGPX(name){
 const txt=await fetch('gpx/'+name+'.gpx').then(r=>r.text());
 const xml=new DOMParser().parseFromString(txt,'text/xml');
 return Array.from(xml.getElementsByTagName('trkpt')).map(pt=>({
  lat:+pt.getAttribute('lat'),
  lon:+pt.getAttribute('lon'),
  ele:+(pt.getElementsByTagName('ele')[0]?.textContent||0)
 }));
}

function dist(a,b){const R=6371;const t=x=>x*Math.PI/180;
const dLat=t(b.lat-a.lat),dLon=t(b.lon-a.lon);
const x=Math.sin(dLat/2)**2+Math.cos(t(a.lat))*Math.cos(t(b.lat))*Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

async function geocode(addr){
 const u=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`;
 const d=await fetch(u).then(r=>r.json());
 if(!d.length) return null;
 return {lat:+d[0].lat,lon:+d[0].lon};
}

function parseGoogle(url){
 const m=url.match(/q=([0-9.-]+),([0-9.-]+)/);
 return m?{lat:+m[1],lon:+m[2]}:null;
}

function nearest(s,pts){let m=Infinity,i0=0;
 pts.forEach((p,i)=>{
  let d0=dist(s,p);
  if(d0<m){m=d0;i0=i}
 });
 return i0;
}

async function loadStops(r){
 return fetch('data/'+r+'-stops.json').then(r=>r.json());
}

async function prepare(pts,st){
 const res=[];
 for(const s of st){
  let c=s.url?parseGoogle(s.url):await geocode(s.address);
  if(!c)continue;
  res.push({...s,...c,index:nearest(c,pts)});
 }
 res.sort((a,b)=>a.index-b.index);
 return res;
}

function speed(dist,up){let base=15;let penalty=up/1000*3;return Math.max(8,base-penalty)}
function classify(d,u){if(d<60&&u<800)return'Leicht';if(d<100&&u<1500)return'Mittel';return'Schwer'}

function buildStages(pts,stops){
 let arr=[];
 for(let i=0;i<stops.length-1;i++){
  let a=stops[i].index,b=stops[i+1].index;
  if(b<=a)b=a+1;
  let seg=pts.slice(a,b);
  let d=0,up=0,down=0;
  for(let j=1;j<seg.length;j++){
    d+=dist(seg[j-1],seg[j]);
    let diff=seg[j].ele-seg[j-1].ele;
    if(diff>0)up+=diff;else down+=Math.abs(diff);
  }
  arr.push({
   name:stops[i].name+' → '+stops[i+1].name,
   dist:d,
   up,down,
   duration:d/speed(d,up),
   difficulty:classify(d,up),
   ele:seg.map(p=>p.ele),
   hotel:stops[i+1]
  });
 }
 return arr;
}

function drawChart(canvasId, data){
 new Chart(document.getElementById(canvasId),{
  type:'line',
  data:{labels:data.map((_,i)=>i),datasets:[{label:'Höhenprofil',data:data}]}
 });
}

async function loadTour(){
 group.clearLayers();
 const r=document.getElementById('routeSelect').value;
 const pts=await loadGPX(r);
 const stops=await prepare(pts,await loadStops(r));

 const stages=buildStages(pts,stops);
 const colors=['red','blue','green','orange'];

 stages.forEach((s,i)=>{
  L.polyline(pts.slice(stops[i].index,stops[i+1].index).map(p=>[p.lat,p.lon]),
    {color:colors[i%colors.length]}).addTo(group);
 });

 stops.forEach(s=>L.marker([s.lat,s.lon]).addTo(group).bindPopup(s.name));
 map.fitBounds(group.getBounds());

 const out=document.getElementById('output');
 out.innerHTML='';

 stages.forEach((s,i)=>{
  const div=document.createElement('div');
  div.className='stage';
  div.innerHTML=`
   <b>${s.name}</b><br>
   Distanz: ${s.dist.toFixed(1)} km<br>
   ↑ ${Math.round(s.up)} m ↓ ${Math.round(s.down)} m<br>
   Dauer: ${s.duration.toFixed(1)} h<br>
   Schwierigkeit: ${s.difficulty}<br>
   <canvas id="chart-${i}"></canvas>
   <div class="hotel">
     <b>🏨 Unterkunft:</b><br>
     ${s.hotel.name}<br>
     ${s.hotel.hotelUrl ? `<a href="${s.hotel.hotelUrl}" target="_blank">Hotel öffnen</a>` : ''}
   </div>
  `;
  out.appendChild(div);
  drawChart(`chart-${i}`, s.ele);
 });
}
</script>
</body>
</html>
