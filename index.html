<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PyScript Fix</title>

  <!-- ✅ STABILE CDN VERSION -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pyscript@latest/dist/core.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/pyscript@latest/dist/core.js"></script>

</head>

<body>

<h1>✅ PyScript Debug Fix</h1>

<button id="btn">Click Me</button>

<div id="output">Noch nichts passiert</div>

<script type="py">
import js
from pyodide.ffi import create_proxy

def test(event):
    js.document.getElementById("output").innerHTML = "✅ Es funktioniert jetzt!"

proxy = create_proxy(test)
js.document.getElementById("btn").addEventListener("click", proxy)
</script>

</body>
</html>
