<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitales Roadbook</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body><div class="container">
  <h1>🚴 Digitales Roadbook</h1>
  <div class="controls compact-controls">
    <label for="routeSelect" class="control-label">Tour</label><select id="routeSelect"></select>
    <button id="loadBtn">↻ Laden</button>
    <details class="download-menu"><summary>⬇ Downloads</summary><div class="download-menu-content">
      <button id="downloadFullGpxBtn" class="secondary">GPX gesamt</button>
      <button id="downloadAllStagesZipBtn" class="secondary">ZIP gesamt + Etappen</button>
      <button id="downloadTourBriefBtn" class="secondary">TXT Steckbrief</button>
    </div></details>
    <button id="downloadActiveStageBtn" class="secondary hidden">⬇ GPX Etappe</button>
    <span id="status"></span>
    <div id="metaBar" class="meta-inline">
      <div id="tourismMetaCard" class="meta-bar-card hidden"><div class="title">🔗 Offizielle Beschreibung</div></div>
      <div id="adfcMetaCard" class="meta-bar-card hidden"><div class="title">⭐ ADFC</div></div>
    </div>
  </div>
  <div id="map"></div>
  <div id="summary" class="summary-grid"></div>
  <div id="stationBox"></div>
  <div id="stages" class="stage-list"></div>
  <div id="hotelBox"></div>
</div><script src="assets/app.js"></script></body></html>
