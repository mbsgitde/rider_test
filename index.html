<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Tour Planner V8 Fixed</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; margin: 0; }
  .container { max-width: 1200px; margin: 0 auto; }
  #controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  #map { height: 440px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; }
  #output { margin-top: 20px; }
  .stage { border: 1px solid #ccc; margin: 12px 0; padding: 12px; border-radius: 8px; background: #fff; }
  .stage h3 { margin: 0 0 8px 0; }
  .meta { line-height: 1.7; margin-bottom: 10px; }
  .hotel { margin-top: 10px; padding: 10px; background: #f7f7f7; border-radius: 6px; }
  .debug { color: #666; font-size: 0.9rem; }
  .hidden { display: none; }
  canvas { max-width: 700px; width: 100%; }
</style>
</head>
<body>
<div class="container">
  <h1>🚴 Bike Tour Planner V8 FIXED</h1>
  <div id="controls">
    <label for="routeSelect">Route:</label>
    <select id="routeSelect">
      <option value="alps">Alpenroute</option>
      <option value="lake">Seenroute</option>
    </select>
    <button onclick="loadTour()">Tour laden</button>
    <span id="status" class="debug"></span>
  </div>
  <div id="map"></div>
  <div id="output"></div>
</div>
<script>
let map = L.map('map').setView([47.7, 11.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap-Mitwirkende'
}).addTo(map);
let group = L.layerGroup().addTo(map);
let charts = [];

function setStatus(txt){ document.getElementById('status').textContent = txt; }

async function loadGPX(name) {
  const txt = await fetch('gpx/' + name + '.gpx').then(r => r.text());
  const xml = new DOMParser().parseFromString(txt, 'text/xml');
  const pts = Array.from(xml.getElementsByTagName('trkpt')).map(pt => ({
    lat: +pt.getAttribute('lat'),
    lon: +pt.getAttribute('lon'),
    ele: +(pt.getElementsByTagName('ele')[0]?.textContent || 0)
  }));
  return pts;
}

function dist(a, b) {
  const R = 6371;
  const t = x => x * Math.PI / 180;
  const dLat = t(b.lat - a.lat), dLon = t(b.lon - a.lon);
  const x = Math.sin(dLat / 2) ** 2 + Math.cos(t(a.lat)) * Math.cos(t(b.lat)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

async function geocode(addr) {
  const u = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`;
  const d = await fetch(u).then(r => r.json());
  if (!d.length) return null;
  return { lat: +d[0].lat, lon: +d[0].lon };
}

function parseGoogle(url) {
  const m = url?.match(/q=([0-9.-]+),([0-9.-]+)/);
  return m ? { lat: +m[1], lon: +m[2] } : null;
}

function nearest(s, pts) {
  let m = Infinity, i0 = 0;
  pts.forEach((p, i) => {
    const d0 = dist(s, p);
    if (d0 < m) { m = d0; i0 = i; }
  });
  return i0;
}

async function loadStops(route) {
  return fetch('data/' + route + '-stops.json').then(r => r.json());
}

async function prepare(pts, stops) {
  const res = [];
  for (const s of stops) {
    let c = null;
    if (typeof s.lat === 'number' && typeof s.lon === 'number') {
      c = { lat: s.lat, lon: s.lon };
    } else if (s.url) {
      c = parseGoogle(s.url);
    }
    if (!c && s.address) {
      c = await geocode(s.address);
    }
    if (!c) continue;
    res.push({ ...s, ...c, index: nearest(c, pts) });
  }
  res.sort((a, b) => a.index - b.index);
  return res;
}

function speed(distanceKm, upMeters) {
  const base = 15;
  const penalty = (upMeters / 1000) * 3;
  return Math.max(8, base - penalty);
}

function classify(distanceKm, upMeters) {
  if (distanceKm < 60 && upMeters < 800) return 'Leicht';
  if (distanceKm < 100 && upMeters < 1500) return 'Mittel';
  return 'Schwer';
}

function buildStages(pts, stops) {
  const out = [];
  for (let i = 0; i < stops.length - 1; i++) {
    let a = stops[i].index;
    let b = stops[i + 1].index;
    if (b <= a) b = Math.min(a + 1, pts.length - 1);
    const seg = pts.slice(a, b + 1);
    let d = 0, up = 0, down = 0;
    for (let j = 1; j < seg.length; j++) {
      d += dist(seg[j - 1], seg[j]);
      const diff = seg[j].ele - seg[j - 1].ele;
      if (diff > 0) up += diff; else down += Math.abs(diff);
    }
    out.push({
      name: stops[i].name + ' → ' + stops[i + 1].name,
      dist: d,
      up, down,
      duration: d / speed(d, up),
      difficulty: classify(d, up),
      ele: seg.map(p => p.ele),
      seg,
      hotel: stops[i + 1].type === 'overnight' ? stops[i + 1] : null
    });
  }
  return out;
}

function destroyCharts() {
  charts.forEach(ch => { try { ch.destroy(); } catch(e){} });
  charts = [];
}

function drawChart(canvasId, data) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const ch = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map((_, i) => i + 1),
      datasets: [{
        label: 'Höhenprofil',
        data,
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37,99,235,0.2)',
        tension: 0.2,
        pointRadius: 0,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { title: { display: true, text: 'Höhe (m)' } }
      }
    }
  });
  charts.push(ch);
}

async function loadTour() {
  setStatus('Lade Tour ...');
  destroyCharts();
  group.clearLayers();
  const route = document.getElementById('routeSelect').value;
  const pts = await loadGPX(route);
  const stops = await prepare(pts, await loadStops(route));
  const stages = buildStages(pts, stops);

  const colors = ['#ef4444', '#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6'];
  stages.forEach((s, i) => {
    L.polyline(s.seg.map(p => [p.lat, p.lon]), { color: colors[i % colors.length], weight: 4 }).addTo(group);
  });
  stops.forEach(s => L.marker([s.lat, s.lon]).addTo(group).bindPopup(s.name));

  if (group.getLayers().length > 0) {
    map.fitBounds(group.getBounds(), { padding: [20, 20] });
  }

  const out = document.getElementById('output');
  out.innerHTML = '';
  if (stages.length === 0) {
    out.innerHTML = '<div class="stage"><b>Keine Etappen gefunden.</b><br><span class="debug">Prüfe bitte die Stops und die GPX-Datei.</span></div>';
    setStatus('Keine Etappen gefunden');
    return;
  }

  stages.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'stage';
    div.innerHTML = `
      <h3>${s.name}</h3>
      <div class="meta">
        Distanz: ${s.dist.toFixed(1)} km<br>
        ↑ ${Math.round(s.up)} m &nbsp; ↓ ${Math.round(s.down)} m<br>
        Dauer: ${s.duration.toFixed(1)} h<br>
        Schwierigkeit: <b>${s.difficulty}</b>
      </div>
      <canvas id="chart-${i}"></canvas>
      ${s.hotel ? `
        <div class="hotel">
          <b>🏨 Unterkunft:</b><br>
          ${s.hotel.name}<br>
          ${s.hotel.hotelUrl ? `<a href="${s.hotel.hotelUrl}" target="_blank" rel="noopener noreferrer">Hotel öffnen</a>` : ''}
        </div>
      ` : ''}
    `;
    out.appendChild(div);
    drawChart(`chart-${i}`, s.ele);
  });

  setStatus(`${stages.length} Tagesabschnitt(e) geladen`);
}
</script>
</body>
</html>
