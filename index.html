<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Tour Planner – GitHub Pages Starter</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="container">
    <h1>🚴 Bike Tour Planner</h1>
    <p class="lead">Statische Tourenplanung auf GitHub Pages mit GPX, Stops/Hotels, zentraler Konfiguration, Höhenprofilen, Netto-/Brutto-Fahrzeit und Plausibilitätswarnungen.</p>

    <div class="controls">
      <label for="routeSelect">Tour:</label>
      <select id="routeSelect">
        <option value="alps">Alpenroute</option>
        <option value="lake">Seenroute</option>
      </select>
      <button id="loadBtn">Tour laden</button>
      <span id="status">Initialisiere …</span>
    </div>

    <div id="map"></div>
    <div id="summary" class="summary-grid"></div>
    <div id="stages" class="stage-list"></div>

    <p class="footer-note">Hinweis: Diese Version enthält den Leaflet-Fix für getBounds().</p>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
