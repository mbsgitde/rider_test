name: Weather Forecast

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC: 03,04,05,06,07,10,13,16,17,18,19,20 UTC
    # = 05,06,07,08,09,12,15,18,19,20,21,22 Uhr MESZ.
    - cron: "0 3,4,5,6,7,10,13,16,17,18,19,20 * * *"

permissions:
  contents: write

concurrency:
  group: weather-forecast-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Sync latest branch state
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git fetch origin "$BRANCH"
          git pull --rebase origin "$BRANCH"
      - name: Keep previous weather
        run: |
          if [ -f data/weather.json ]; then cp data/weather.json /tmp/weather.before.json; fi
      - name: Generate weather forecast
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node assets/generateWeather.js
      - name: Detect meaningful weather changes
        run: |
          node <<'NODE'
          const fs = require('fs');
          const before = '/tmp/weather.before.json', after = 'data/weather.json';
          if (!fs.existsSync(before) || !fs.existsSync(after)) process.exit(0);
          function normalize(v){ if(Array.isArray(v)) return v.map(normalize); if(v&&typeof v==='object'){const o={}; for(const k of Object.keys(v).sort()){ if(k==='generatedAt') continue; o[k]=normalize(v[k]); } return o;} return v; }
          const oldJson=JSON.parse(fs.readFileSync(before,'utf8')), newJson=JSON.parse(fs.readFileSync(after,'utf8'));
          if(JSON.stringify(normalize(oldJson))===JSON.stringify(normalize(newJson))){fs.copyFileSync(before,after);fs.writeFileSync('/tmp/weather.nochange','1');console.log('Only generatedAt changed; restored previous weather.json and will skip commit.')} else console.log('Meaningful weather change detected.');
          NODE
      - name: Commit generated weather.json
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f /tmp/weather.nochange ]; then echo "No meaningful weather changes"; exit 0; fi
          git add data/weather.json
          if git diff --cached --quiet; then echo "No weather changes"; exit 0; fi
          git commit -m "Update weather forecast"
          git pull --rebase --autostash origin "$BRANCH"
          git push origin HEAD:"$BRANCH"
